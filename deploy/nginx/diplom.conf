server {
    listen 80;
    server_name label.zhkh-razmetka.ru 82.208.73.120;

    client_max_body_size 5m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    include /etc/nginx/snippets/diplom-maintenance-fallback.conf;

    location /static/ {
        alias /home/oldskull/apps/Diplomnaya-rabota/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        limit_req zone=diplom_app burst=40 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
